name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, such as v0.1.0
        required: true
        type: string

jobs:
  release:
    # Package.swift uses Swift tools 6.3. The macos-26 image provides Xcode 26.x
    # by default; the package still builds with a macOS 14 deployment target.
    runs-on: macos-26
    permissions:
      contents: write
    env:
      TAP_REPOSITORY: h3nock/homebrew-tap
      TAP_NAME: h3nock/tap
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            git fetch origin "refs/tags/$tag:refs/tags/$tag"
            git checkout --detach "refs/tags/$tag"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::release tag must use vX.Y.Z format, got $tag"
            exit 1
          fi

          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build release archive
        run: scripts/build-release-archive.sh "${{ steps.version.outputs.version }}"

      - name: Require Homebrew tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "::error::HOMEBREW_TAP_TOKEN is required to update ${TAP_REPOSITORY}"
            exit 1
          fi

      - name: Validate Homebrew formula from local archive
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          archive="$GITHUB_WORKSPACE/dist/clipper-v${VERSION}-macos-universal.tar.gz"
          sha256="$(shasum -a 256 "$archive" | awk '{print $1}')"
          archive_url="file://${archive}"
          tap_dir="$(mktemp -d)"

          cleanup() {
            HOMEBREW_NO_AUTO_UPDATE=1 brew uninstall --formula local/clipperrelease/clipper >/dev/null 2>&1 || true
            HOMEBREW_NO_AUTO_UPDATE=1 brew untap local/clipperrelease >/dev/null 2>&1 || true
            rm -rf "$tap_dir"
          }
          trap cleanup EXIT

          gh repo clone "$TAP_REPOSITORY" "$tap_dir"
          cd "$tap_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "clipper-local-test-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          CLIPPER_TARBALL_URL="$archive_url" "$GITHUB_WORKSPACE/scripts/update-homebrew-formula.sh" "$VERSION" "$sha256" "$tap_dir"
          git add Formula/clipper.rb README.md
          git commit -m "Validate clipper ${VERSION}"

          HOMEBREW_NO_AUTO_UPDATE=1 brew tap local/clipperrelease "$tap_dir"
          HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALL_FROM_API=1 brew audit --formula local/clipperrelease/clipper
          HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALL_FROM_API=1 brew install local/clipperrelease/clipper
          HOMEBREW_NO_AUTO_UPDATE=1 brew test local/clipperrelease/clipper

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          archive="dist/clipper-v${VERSION}-macos-universal.tar.gz"
          checksum="${archive}.sha256"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$archive" "$checksum" --clobber
          else
            gh release create "$TAG" "$archive" "$checksum" \
              --title "clipper ${TAG}" \
              --verify-tag \
              --generate-notes
          fi

      - name: Open Homebrew tap pull request
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          archive="dist/clipper-v${VERSION}-macos-universal.tar.gz"
          sha256="$(shasum -a 256 "$archive" | awk '{print $1}')"
          tap_dir="$(mktemp -d)"
          branch="clipper-v${VERSION}-${GITHUB_RUN_ID}"

          gh repo clone "$TAP_REPOSITORY" "$tap_dir"
          cd "$tap_dir"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"

          "$GITHUB_WORKSPACE/scripts/update-homebrew-formula.sh" "$VERSION" "$sha256" "$tap_dir"
          git add Formula/clipper.rb README.md

          if git diff --cached --quiet; then
            echo "Homebrew tap is already up to date for clipper ${VERSION}."
            exit 0
          fi

          git commit -m "Add clipper ${VERSION}"

          brew tap "$TAP_NAME" "$tap_dir"
          brew audit --formula "$TAP_NAME/clipper"
          HOMEBREW_NO_INSTALL_FROM_API=1 brew install "$TAP_NAME/clipper"
          brew test "$TAP_NAME/clipper"

          git push origin "$branch"
          gh pr create \
            --repo "$TAP_REPOSITORY" \
            --head "$branch" \
            --title "Add clipper ${VERSION}" \
            --body "Adds the clipper ${VERSION} formula using the release artifact from h3nock/clipper."
